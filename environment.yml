name: phis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch
  - pytorch>=2.0
  - torchvision>=0.15
  - pytorch-cuda=12.1

  - numpy>=1.24
  - scipy>=1.10
  - pandas
  - scikit-learn>=1.3

  # Vision / image
  - opencv
  - pillow>=10.0

  # Geo stack
  - rasterio
  - pyproj
  - shapely
  - gdal
  - libgdal-jp2openjpeg

  # ML / deep learning utilities
  - huggingface_hub
  - einops

  # Utilities
  - psutil
  - matplotlib>=3.7
  - tqdm>=4.65
  - loguru

  - pip:
    - "setuptools<82.0.0"
    - wheel
    - pytorch-lightning
    - kornia>=0.7
    - affine>=2.4
    - yacs
    - pycolmap
    - earthengine-api
    - geedim

# ── Commands ────────────────────────────────────────────────────────────────
# Install libmamba solver first (one-time):
#   conda install -n base conda-libmamba-solver
#   conda config --set solver libmamba
#
# Create:   conda env create -f environment.yml
# Update:   conda env update -f environment.yml --prune
# Activate: conda activate phis